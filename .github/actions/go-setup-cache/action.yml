name: Go setup + cache
description: >-
  Set up Go from go.mod and restore an explicit GOMODCACHE / GOCACHE
  keyed on go.sum. Expects the repo to already be checked out (each
  workflow does its own sparse-checkout inline, since local composite
  actions cannot run their own checkout before they are themselves read
  from disk).

inputs:
  cache-suffix:
    description: >-
      Optional suffix appended to the Go cache key. Use this when a job
      cross-compiles for a different target architecture so its cache does not
      collide with the host-arch build cache.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: 'go.mod'
        cache: false

    - name: Restore Go module & build cache
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
        key: ${{ runner.os }}-go${{ inputs.cache-suffix }}-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go${{ inputs.cache-suffix }}-
