name: ci-secret-scan

# Dedicated secret scanner. We invoke the gitleaks CLI directly (MIT-licensed,
# free) rather than the gitleaks/gitleaks-action wrapper, which requires a paid
# license for use under a GitHub organization.
#
# Reusable unit: the trigger workflows call this on pull requests and main
# pushes. The scan is scoped to the PR/push commit range (see the gitleaks step)
# so new-branch pushes do not rescan full history.

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'ubuntu-latest'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history lets gitleaks inspect the exact PR/push commit range.
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP/bin" gitleaks
          chmod +x "$RUNNER_TEMP/bin/gitleaks"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/bin/gitleaks" version

      - name: gitleaks
        # detect mode scans the commits introduced by the PR or push;
        # --redact keeps any matched secrets out of the logs. Non-zero exit on
        # findings fails the job.
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          args=(detect --source . --redact --verbose)
          zero_sha="0000000000000000000000000000000000000000"

          case "$EVENT_NAME" in
            pull_request)
              if [ -z "$PR_BASE_SHA" ] || [ -z "$PR_HEAD_SHA" ]; then
                echo "Could not resolve pull request commit range" >&2
                exit 1
              fi
              args+=(--log-opts="${PR_BASE_SHA}..${PR_HEAD_SHA}")
              ;;
            push)
              if [ -n "$PUSH_BEFORE_SHA" ] && [ "$PUSH_BEFORE_SHA" != "$zero_sha" ]; then
                args+=(--log-opts="${PUSH_BEFORE_SHA}..${PUSH_AFTER_SHA}")
              fi
              ;;
          esac

          gitleaks "${args[@]}"
