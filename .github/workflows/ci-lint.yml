name: ci-lint

# Reusable unit running our linters in parallel. There is no application Go code
# in this repo (the scenarios are fixtures), so linting focuses on the things we
# actually ship: Dockerfiles, shell scripts, and the workflows themselves.
# Thresholds are set to fail on errors, not style nits, so this gate stays
# meaningful without being noisy.

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'ubuntu-latest'
  workflow_dispatch:

jobs:
  hadolint:
    name: hadolint (Dockerfiles)
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
      - name: Install hadolint
        env:
          HADOLINT_VERSION: 2.12.0
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VERSION}/hadolint-Linux-x86_64" \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint
          hadolint --version
      - name: Lint Dockerfiles
        run: hadolint --failure-threshold error docker/*.Dockerfile

  shellcheck:
    name: shellcheck (scripts)
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
      - name: Run shellcheck
        run: |
          set -euo pipefail
          # Note: the shellcheck binary is preinstalled on GitHub-hosted Ubuntu runners.
          shellcheck --version
          mapfile -t scripts < <(git ls-files '*.sh')
          if [ "${#scripts[@]}" -gt 0 ]; then
            shellcheck --severity=error "${scripts[@]}"
          else
            echo "No shell scripts found"
          fi

  actionlint:
    name: actionlint (workflows)
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
      - name: Install and run actionlint
        run: |
          set -euo pipefail
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color
